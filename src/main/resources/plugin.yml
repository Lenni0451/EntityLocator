name: "EntityLocator"
author: "Lenni0451"
version: "${version}"
main: "net.lenni0451.entitylocator.Main"
api-version: "1.21"

commands:
  entitylocator:
    description: "Main command for the EntityLocator plugin"
    usage: "/entitylocator"
    permission: "entitylocator.use"
  entitydump:
    description: "Dump all entities in the world to a file"
    usage: "/entitydump"
    permission: "entitylocator.use"

permissions:
  entitylocator.use:
    description: "Permission to use the EntityLocator plugin"
    default: "op"
